# Configuración de Fauna Urbana NYC
# Este archivo es la única fuente de verdad para todos los parámetros del sistema.

stream:
  url: "https://www.youtube.com/watch?v=a9J1OP_x5Rg"  # Times Square Express View (alternativo mientras rnXIjl_Rzy4 está offline)
  frames_por_inferencia: 4  # Analizar 1 de cada N frames con YOLO

modelo:
  ruta: "modelos/fauna_urbana.pt"  # Ruta al modelo fine-tuned
  confianza_minima: 0.20

gemma:
  # Proveedor activo: "huggingface" (desarrollo) o "ollama" (producción red local)
  # Las credenciales y la URL van en .env
  proveedor: "huggingface"
  modelo_nombre: "google/gemma-3-27b-it"  # HuggingFace Inference API
  ollama_modelo: "gemma4:latest"          # Nombre del modelo en Ollama local
  timeout_segundos: 15  # Tiempo máximo de espera antes de descartar la verificación
  clases:
    0: "batman"
    1: "deadpool"
    2: "elmo"
    3: "estatua_libertad"
    4: "gorila"
    5: "mickey_mouse"
    6: "minnie_mouse"
    7: "sonic"
    8: "spiderman"
    9: "super_mario"
    10: "transformer"

zonas:
  # Frame 1920×1080. La zona de interés cubre la plaza peatonal de Times Square.
  # esquina_norte y esquina_sur la dividen en mitad superior e inferior.
  - nombre: "fauna"
    deteccion: ["batman", "deadpool", "elmo", "estatua_libertad", "gorila", "mickey_mouse", "minnie_mouse", "sonic", "spiderman", "super_mario", "transformer"]
    puntos: [[750, 440], [1920, 440], [1920, 1080], [750, 1080]]
  - nombre: "esquina_norte"
    deteccion: ["batman", "deadpool", "elmo", "estatua_libertad", "gorila", "mickey_mouse", "minnie_mouse", "sonic", "spiderman", "super_mario", "transformer"]
    puntos: [[650, 440], [1920, 440], [1920, 790], [650, 790]]
  - nombre: "esquina_sur"
    deteccion: ["batman", "deadpool", "elmo", "estatua_libertad", "gorila", "mickey_mouse", "minnie_mouse", "sonic", "spiderman", "super_mario", "transformer"]
    puntos: [[500, 790], [1920, 790], [1920, 1080], [500, 1080]]

hitos:
  frames_consecutivos: 5  # Frames que debe cumplirse la condición para disparar el hito

  avengers_assemble:
    activo: true
    superheroes_minimos: 3        # Número mínimo de superhéroes simultáneos
    zona: null                    # null = cualquier zona del frame
    cooldown_segundos: 120        # Tiempo mínimo entre disparos del mismo hito

  conflicto_identidad:
    activo: true
    zona: "misma"                 # Dos del mismo tipo en la misma zona
    cooldown_segundos: 60

  hora_punta:
    activo: true
    personajes_minimos: 5
    zona: null
    cooldown_segundos: 300

  avistamiento_raro:
    activo: true
    ausencia_minutos: 30          # Minutos sin ver el personaje para considerar reaparición
    cooldown_segundos: 1800

  marvel_vs_dc:
    activo: true
    personaje_marvel: "spiderman"
    personaje_dc: "batman"
    zona: null
    cooldown_segundos: 180

panel:
  activo: true
  puerto: 8050

notificaciones:
  telegram:
    activo: false                 # Activar cuando se configure el bot
    # Las credenciales van en .env, no aquí. Ver .env.example

  tts:
    activo: false
    velocidad: 150

base_datos:
  ruta: "fauna_urbana.db"

capturas:
  carpeta: "capturas/"
  guardar_en_hito: true
